<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Рисовашка</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #eee8ff;
    }

    #app-frame {
      width: 100vw;
      height: 100vh;
      border: 0;
      display: block;
      background: white;
    }

    #unity-container {
      display: none;
    }
  </style>
</head>

<body>
  <iframe
    id="app-frame"
    src="https://uch.greathan.ru"
    allow="fullscreen; clipboard-read; clipboard-write"
  ></iframe>

  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>
  </div>
</body>
</html>
